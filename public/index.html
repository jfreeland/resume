<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ok</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <script>
      async function recordVisit() {
        const response = await fetch("https://api.free.land/visits", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        const data = await response.json();
        console.log(data);
      }

      async function getVisits() {
        const response = await fetch("https://api.free.land/visits");
        const data = await response.json();
        document.getElementById("visits").innerText = `${data.visits}`;
      }

      document.addEventListener("DOMContentLoaded", () => {
        recordVisit();
        getVisits();
      });
    </script>
  </head>
  <body class="bg-gray-100 h-screen flex flex-col">
    <main class="flex-grow relative flex items-center justify-center w-full">
      <div class="text-center space-y-1">
        <div class="flex items-center justify-center">hi mom</div>
        <div class="flex items-center justify-center" id="visits">..</div>
      </div>
    </main>
  </body>
</html>
